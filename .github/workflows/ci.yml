name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-httpx pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

      - name: Test CLI
        run: |
          pip install .
          corsair --version
          # Exit code reflects security score, not CLI errors
          # We just want to verify the CLI runs without crashing
          corsair scan https://httpbin.org/headers --output json --no-banner || true

  lint:
    runs-on: ubuntu-latest
    # Lint job is advisory - don't block on formatting differences
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff black

      - name: Check formatting
        run: black --check --line-length 100 corsair/ tests/ || echo "Formatting differences detected (non-blocking)"

      - name: Lint with ruff
        run: ruff check corsair/ || true
